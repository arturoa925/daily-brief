<html lang="en">
<head>

<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --accent: #c8452a;
    --gold: #b8964e;
    --muted: #7a7060;
    --divider: #d4cdc0;
    --card-bg: rgba(0,0,0,0.04);
    --skeleton-a: #e8e0d0;
    --skeleton-b: #d8d0c0;
  }
  [data-theme="dark"] {
    --ink: #e8e3d8;
    --paper: #181714;
    --accent: #d4553b;
    --gold: #c9a85e;
    --muted: #7a7468;
    --divider: #2c2b27;
    --card-bg: rgba(255,255,255,0.06);
    --skeleton-a: #252420;
    --skeleton-b: #302f2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
    transition: background 0.3s, color 0.3s;
  }
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 20px 24px 14px;
    text-align: center;
  }
  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 8vw, 48px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .masthead .edition {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
    border-top: 1px solid var(--divider);
    padding-top: 8px;
  }
  .location-bar {
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    padding: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .location-bar span { color: var(--gold); text-decoration: underline; }
  .sections { padding: 0 20px; }
  .section {
    border-bottom: 1px solid var(--divider);
    padding: 20px 0;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .section.visible { opacity: 1; transform: none; }
  .section-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--divider);
  }
  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(17px, 4.5vw, 24px);
    line-height: 1.4;
    font-style: italic;
  }
  .quote-author {
    margin-top: 10px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .quote-author::before { content: '— '; }
  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .weather-main {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .weather-temp {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
  }
  .weather-desc { font-size: 15px; color: var(--muted); line-height: 1.4; }
  .weather-detail {
    font-size: 12px;
    color: var(--muted);
    background: var(--card-bg);
    padding: 8px 12px;
    border-radius: 4px;
  }
  .weather-detail strong { display: block; color: var(--ink); font-size: 14px; font-weight: 500; }
  .news-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--divider);
  }
  .news-item:last-child { border-bottom: none; }
  .news-headline {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    line-height: 1.3;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .news-headline a { color: var(--ink); text-decoration: none; }
  .news-headline a:hover { color: var(--accent); }
  .news-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .news-source { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-top: 4px; }
  .schedule-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .schedule-input {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--divider);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .schedule-input:focus { border-color: var(--ink); }
  .add-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .schedule-list { list-style: none; }
  .schedule-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--divider);
    font-size: 14px;
  }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-time { font-size: 11px; color: var(--accent); font-weight: 500; min-width: 38px; }
  .schedule-remove { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .skeleton {
    background: linear-gradient(90deg, var(--skeleton-a) 25%, var(--skeleton-b) 50%, var(--skeleton-a) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    height: 18px;
    margin-bottom: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .refresh-btn {
    display: block;
    margin: 24px auto 0;
    background: none;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 12px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.2s, color 0.2s;
  }
  .refresh-btn:hover { background: var(--ink); color: var(--paper); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg { color: var(--muted); font-size: 13px; }
  .email-item { padding: 10px 0; border-bottom: 1px solid var(--divider); }
  .email-item:last-child { border-bottom: none; }
  .email-from { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .email-unread .email-from { color: var(--accent); }
  .email-subject { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; line-height: 1.3; margin: 3px 0 4px; color: var(--ink); }
  .email-snippet { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .connect-btn {
    background: none;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.2s, color 0.2s;
  }
  .connect-btn:hover { background: var(--ink); color: var(--paper); }
  .theme-toggle {
    background: none;
    border: 1px solid var(--divider);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1.4;
    transition: border-color 0.2s, color 0.2s;
  }
  .theme-toggle:hover { border-color: var(--ink); color: var(--ink); }
</style>
<script>
(function(){
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#0f0e0c';
  ctx.fillRect(0, 0, 180, 180);
  // Gold rule lines
  ctx.strokeStyle = '#b8964e';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(22, 55); ctx.lineTo(158, 55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22, 125); ctx.lineTo(158, 125); ctx.stroke();
  // Monogram
  ctx.fillStyle = '#f5f0e8';
  ctx.font = 'bold 82px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('DB', 90, 90);
  document.getElementById('appIcon').href = c.toDataURL();
})();
</script>

  📍 Tap to detect your location
</div>

<div class="masthead">

    <span style="display:flex;align-items:center;gap:8px">

      <div class="skeleton" style="width:100%"></div><div class="skeleton" style="width:70%;margin-bottom:16px"></div>

  <div class="section" id="emailSection">

<button class="refresh-btn" id="refreshBtn" onclick="loadAll(true)">↻ Refresh Brief</button>

<script>
// ── Quotes list (no API needed) ───────────────────────────
const QUOTES = [
  { quote: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
  { quote: "Strength does not come from the body. It comes from the will of the soul.", author: "Mahatma Gandhi" },
  { quote: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
  { quote: "The harder you work, the luckier you get.", author: "Gary Player" },
  { quote: "You don't have to be extreme, just consistent.", author: "Unknown" },
  { quote: "Take care of your body. It's the only place you have to live.", author: "Jim Rohn" },
  { quote: "The pain you feel today will be the strength you feel tomorrow.", author: "Arnold Schwarzenegger" },
  { quote: "It never gets easier. You just get better.", author: "Unknown" },
  { quote: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
  { quote: "What seems impossible today will one day become your warm-up.", author: "Unknown" },
  { quote: "Discipline is the bridge between goals and accomplishment.", author: "Jim Rohn" },
  { quote: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
  { quote: "Don't limit your challenges. Challenge your limits.", author: "Unknown" },
  { quote: "The body achieves what the mind believes.", author: "Unknown" },
  { quote: "Work hard in silence, let success be your noise.", author: "Frank Ocean" },
  { quote: "Your future self is watching you right now through your memories.", author: "Aubrey De Grey" },
  { quote: "Be so good they can't ignore you.", author: "Steve Martin" },
  { quote: "It always seems impossible until it's done.", author: "Nelson Mandela" },
  { quote: "Energy and persistence conquer all things.", author: "Benjamin Franklin" },
  { quote: "The secret of getting ahead is getting started.", author: "Mark Twain" },
  { quote: "Champions aren't made in gyms. Champions are made from something deep inside.", author: "Muhammad Ali" },
  { quote: "Sweat is just fat crying.", author: "Unknown" },
  { quote: "Do something today that your future self will thank you for.", author: "Sean Patrick Flanery" },
  { quote: "If it doesn't challenge you, it doesn't change you.", author: "Fred Devito" },
  { quote: "The difference between try and triumph is a little umph.", author: "Marvin Phillips" },
  { quote: "You are your only limit.", author: "Unknown" },
  { quote: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
  { quote: "Dream big, work hard, stay focused.", author: "Unknown" },
  { quote: "Good things come to those who sweat.", author: "Unknown" },
  { quote: "Rise up, start fresh, see the bright opportunity in each new day.", author: "Unknown" },
  { quote: "Train insane or remain the same.", author: "Unknown" },
];

// ── Date ──────────────────────────────────────────────────
const now = new Date();
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('todayDate').textContent = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
document.getElementById('todayDay').textContent = DAYS[now.getDay()];

// ── Location ──────────────────────────────────────────────
const CITY_KEY = 'brief_city';
const LAT_KEY  = 'brief_lat';
const LON_KEY  = 'brief_lon';
let city = localStorage.getItem(CITY_KEY) || '';
let lat  = localStorage.getItem(LAT_KEY)  || '';
let lon  = localStorage.getItem(LON_KEY)  || '';

function updateLocationBar() {
  document.getElementById('locationBar').innerHTML = city
    ? `📍 Weather for <span>${city}</span> &nbsp;·&nbsp; <span onclick="refreshLocation()">use GPS</span> &nbsp;·&nbsp; <span onclick="promptCity()">enter city</span>`
    : `📍 <span onclick="refreshLocation()">Tap to detect location</span> &nbsp;·&nbsp; <span onclick="promptCity()">enter city manually</span>`;
}
updateLocationBar();

function detectLocation() {
  return new Promise((resolve) => {
    const bar = document.getElementById('locationBar');
    if (!navigator.geolocation) { resolve(); return; }
    bar.innerHTML = `📍 Getting your location…`;
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        localStorage.setItem(LAT_KEY, lat);
        localStorage.setItem(LON_KEY, lon);
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
          const data = await res.json();
          const addr = data.address || {};
          const place = addr.city || addr.town || addr.village || addr.county || 'Your Location';
          city = addr.state ? `${place}, ${addr.state}` : place;
          localStorage.setItem(CITY_KEY, city);
        } catch(e) {
          city = 'Your Location';
          localStorage.setItem(CITY_KEY, city);
        }
        updateLocationBar();
        resolve();
      },
      () => {
        if (lat && lon) {
          updateLocationBar();
        } else {
          bar.innerHTML = `📍 Location denied — <span onclick="promptCity()">enter city manually</span>`;
        }
        resolve();
      },
      { timeout: 10000, maximumAge: 300000 }
    );
  });
}

async function refreshLocation() {
  await detectLocation();
  await Promise.all([loadWeather(), loadNews()]);
}

async function promptCity() {
  const input = prompt('Enter your city (e.g. Los Angeles):');
  if (!input || !input.trim()) return;
  city = input.trim();
  try {
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const geoData = await geo.json();
    if (geoData.results && geoData.results.length > 0) {
      lat = geoData.results[0].latitude;
      lon = geoData.results[0].longitude;
      city = geoData.results[0].name + (geoData.results[0].admin1 ? ', ' + geoData.results[0].admin1 : '');
      localStorage.setItem(CITY_KEY, city);
      localStorage.setItem(LAT_KEY, lat);
      localStorage.setItem(LON_KEY, lon);
      updateLocationBar();
      loadWeather();
    } else {
      alert("City not found. Try again with a different spelling.");
    }
  } catch(e) {
    alert("Couldn't look up that city. Check your connection.");
  }
}

// ── Tasks ──────────────────────────────────────────────────
const TASKS_KEY = 'brief_tasks_' + now.toDateString();
let tasks = JSON.parse(localStorage.getItem(TASKS_KEY) || '[]');
function saveTasks() { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); }
function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = tasks.length === 0
    ? '<li style="color:var(--muted);font-size:13px;padding:8px 0">No tasks yet — add something above.</li>'
    : tasks.map((t, i) => `
        <li class="schedule-item">
          <span class="schedule-time">${t.time}</span>
          <span>${t.text}</span>
          <button class="schedule-remove" onclick="removeTask(${i})">×</button>
        </li>`).join('');
}
function addTask() {
  const input = document.getElementById('taskInput');
  const val = input.value.trim();
  if (!val) return;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  tasks.push({ text: val, time });
  saveTasks();
  renderTasks();
  input.value = '';
}
function removeTask(i) { tasks.splice(i, 1); saveTasks(); renderTasks(); }
document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
renderTasks();

// ── Reveal ────────────────────────────────────────────────
function reveal(id, delay = 0) {
  setTimeout(() => document.getElementById(id)?.classList.add('visible'), delay);
}

// ── Quote (daily rotation from local list) ────────────────
function loadQuote() {
  const idx = now.getDate() % QUOTES.length;
  const q = QUOTES[idx];
  document.getElementById('quoteContent').innerHTML = `
    <div class="quote-text">${q.quote}</div>
    <div class="quote-author">${q.author}</div>`;
  reveal('quoteSection', 0);
}

// ── Weather (Open-Meteo — free, no key) ───────────────────
const WMO = {
  0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain', 71:'Light snow', 73:'Snow', 75:'Heavy snow',
  80:'Rain showers', 81:'Rain showers', 82:'Violent showers',
  95:'Thunderstorm', 96:'Thunderstorm w/ hail', 99:'Thunderstorm w/ hail'
};
async function loadWeather() {
  if (!lat || !lon) {
    document.getElementById('weatherContent').innerHTML =
      `<div class="error-msg">Tap the bar above to set your city.</div>`;
    reveal('weatherSection', 100);
    return;
  }
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`;
    const res = await fetch(url);
    const d = await res.json();
    const temp   = Math.round(d.current.temperature_2m) + '°F';
    const humid  = d.current.relative_humidity_2m + '%';
    const cond   = WMO[d.current.weather_code] || 'Unknown';
    const high   = Math.round(d.daily.temperature_2m_max[0]) + '°F';
    const low    = Math.round(d.daily.temperature_2m_min[0]) + '°F';
    document.getElementById('weatherContent').innerHTML = `
      <div class="weather-grid">
        <div class="weather-main">
          <div class="weather-temp">${temp}</div>
          <div class="weather-desc">${cond}<br><small style="font-size:11px;color:var(--muted)">${city}</small></div>
        </div>
        <div class="weather-detail"><strong>${high}</strong> High</div>
        <div class="weather-detail"><strong>${low}</strong> Low</div>
        <div class="weather-detail"><strong>${humid}</strong> Humidity</div>
      </div>`;
    reveal('weatherSection', 100);
  } catch(e) {
    document.getElementById('weatherContent').innerHTML = `<div class="error-msg">Couldn't load weather. Try refreshing.</div>`;
    reveal('weatherSection', 100);
  }
}

// ── News (Google News RSS with proxy fallbacks) ───────────
async function fetchRSS(rssUrl) {
  const proxies = [
    async () => {
      const r = await fetchTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
      const d = await r.json();
      if (!d.contents) throw new Error('empty');
      return d.contents;
    },
    async () => {
      const r = await fetchTimeout(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(rssUrl)}`);
      if (!r.ok) throw new Error('failed');
      return r.text();
    },
    async () => {
      const r = await fetchTimeout(`https://corsproxy.io/?${encodeURIComponent(rssUrl)}`);
      if (!r.ok) throw new Error('failed');
      return r.text();
    }
  ];
  for (const proxy of proxies) {
    try { return await proxy(); } catch(e) { /* try next */ }
  }
  throw new Error('all proxies failed');
}

function fetchTimeout(url, ms = 7000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
}

function parseNewsItems(xmlStr) {
  const xml = new DOMParser().parseFromString(xmlStr, 'text/xml');
  const items = Array.from(xml.querySelectorAll('item')).slice(0, 4);
  if (items.length === 0) throw new Error('no items');
  return items.map(item => {
    const rawTitle = item.querySelector('title')?.textContent || '';
    const sourceName = item.querySelector('source')?.textContent || 'News';
    const title = rawTitle.replace(new RegExp(`\\s*-\\s*${sourceName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}$`), '').trim() || rawTitle;
    const linkEl = item.getElementsByTagName('link')[0];
    const link = linkEl?.textContent?.trim() || '#';
    const desc = item.querySelector('description')?.textContent || '';
    const clean = desc.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().slice(0, 120);
    return `
      <div class="news-item">
        <div class="news-headline"><a href="${link}" target="_blank">${title}</a></div>
        ${clean ? `<div class="news-summary">${clean}…</div>` : ''}
        <div class="news-source">${sourceName}</div>
      </div>`;
  }).join('');
}

const NEWS_HTML_KEY = 'brief_news_html';
const NEWS_TS_KEY   = 'brief_news_ts';
const NEWS_CITY_KEY = 'brief_news_city';
const NEWS_TTL      = 30 * 60 * 1000; // 30 minutes

async function loadNews(forceRefresh = false) {
  const cachedHtml = localStorage.getItem(NEWS_HTML_KEY);
  const cachedTs   = parseInt(localStorage.getItem(NEWS_TS_KEY) || '0');
  const cachedCity = localStorage.getItem(NEWS_CITY_KEY) || '';
  const currentCity = (city && city !== 'Your Location') ? city.split(',')[0].trim() : '';
  const cacheAge   = Date.now() - cachedTs;
  const cityChanged = currentCity !== cachedCity;

  // Show cached content immediately if it exists and is still fresh
  if (cachedHtml && !cityChanged && !forceRefresh && cacheAge < NEWS_TTL) {
    document.getElementById('newsContent').innerHTML = cachedHtml;
    reveal('newsSection', 200);
    return;
  }

  // If we have any usable cache, show it now while we fetch in background
  if (cachedHtml && !cityChanged) {
    document.getElementById('newsContent').innerHTML = cachedHtml;
    reveal('newsSection', 200);
  }

  const searchCity = currentCity || '';
  const query = searchCity ? `${searchCity} local news` : 'top news';
  try {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=en-US&gl=US&ceid=US:en`;
    const xmlStr = await fetchRSS(rssUrl);
    const html = parseNewsItems(xmlStr);
    localStorage.setItem(NEWS_HTML_KEY, html);
    localStorage.setItem(NEWS_TS_KEY, Date.now().toString());
    localStorage.setItem(NEWS_CITY_KEY, currentCity);
    document.getElementById('newsContent').innerHTML = html;
    reveal('newsSection', 200);
  } catch(e) {
    if (!cachedHtml || cityChanged) {
      document.getElementById('newsContent').innerHTML =
        `<div class="error-msg">Couldn't load local news. Check your connection and refresh.</div>`;
      reveal('newsSection', 200);
    }
    // Cached content is already showing — leave it in place
  }
}

// ── Gmail ─────────────────────────────────────────────────
const GMAIL_CLIENT_ID = '33187806113-mek6tnuqv6lp3001k48551f1k2et4sla.apps.googleusercontent.com';
const GMAIL_SCOPE = 'https://www.googleapis.com/auth/gmail.readonly';
let tokenClient;
let gmailToken = null;

function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GMAIL_CLIENT_ID,
    scope: GMAIL_SCOPE,
    callback: async (resp) => {
      if (resp.error) { showGmailConnect(); return; }
      gmailToken = resp.access_token;
      await fetchEmails();
    }
  });
}

function showGmailConnect() {
  document.getElementById('emailContent').innerHTML =
    `<button class="connect-btn" onclick="connectGmail()">Connect Gmail</button>`;
  reveal('emailSection', 300);
}

function connectGmail() {
  if (!window.google) return;
  if (!tokenClient) initTokenClient();
  tokenClient.requestAccessToken();
}

async function loadEmails() {
  if (!window.google) { setTimeout(loadEmails, 500); return; }
  if (!tokenClient) initTokenClient();
  if (!gmailToken) { showGmailConnect(); return; }
  await fetchEmails();
}

async function fetchEmails() {
  try {
    const today = new Date(); today.setHours(0,0,0,0);
    const after = Math.floor(today.getTime() / 1000);
    const listRes = await fetch(
      `https://gmail.googleapis.com/gmail/v1/users/me/messages?q=in:inbox after:${after}&maxResults=5`,
      { headers: { Authorization: `Bearer ${gmailToken}` } }
    );
    if (listRes.status === 401) { gmailToken = null; showGmailConnect(); return; }
    const listData = await listRes.json();
    if (!listData.messages || listData.messages.length === 0) {
      document.getElementById('emailContent').innerHTML = `<div class="error-msg">No emails today.</div>`;
      reveal('emailSection', 300);
      return;
    }
    const details = await Promise.all(
      listData.messages.slice(0, 5).map(msg =>
        fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From`,
          { headers: { Authorization: `Bearer ${gmailToken}` } }
        ).then(r => r.json())
      )
    );
    const html = details.map(msg => {
      const headers = msg.payload?.headers || [];
      const subject = headers.find(h => h.name === 'Subject')?.value || '(no subject)';
      const from = headers.find(h => h.name === 'From')?.value || '';
      const fromName = from.replace(/<[^>]+>/g, '').replace(/"/g, '').trim() || from;
      const snippet = (msg.snippet || '').slice(0, 100);
      const unread = msg.labelIds?.includes('UNREAD');
      return `
        <div class="email-item${unread ? ' email-unread' : ''}">
          <div class="email-from">${fromName}</div>
          <div class="email-subject">${subject}</div>
          ${snippet ? `<div class="email-snippet">${snippet}…</div>` : ''}
        </div>`;
    }).join('');
    document.getElementById('emailContent').innerHTML = html;
    reveal('emailSection', 300);
  } catch(e) {
    document.getElementById('emailContent').innerHTML = `<div class="error-msg">Couldn't load emails. Try refreshing.</div>`;
    reveal('emailSection', 300);
  }
}

// ── Load all ──────────────────────────────────────────────
async function loadAll(forceRefresh = false) {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  ['quoteSection','weatherSection','newsSection','emailSection'].forEach(id =>
    document.getElementById(id).classList.remove('visible'));
  loadQuote();
  if (!lat || !lon) {
    await detectLocation();
  }
  await Promise.all([loadWeather(), loadNews(forceRefresh), loadEmails()]);
  btn.disabled = false;
  btn.textContent = '↻ Refresh Brief';
}

const THEME_KEY = 'brief_theme';
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeToggle').textContent = dark ? '○' : '◑';
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
  localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
  applyTheme(dark);
}
applyTheme(localStorage.getItem(THEME_KEY) === 'dark');
