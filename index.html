<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arturo's Daily Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --accent: #c8452a;
    --gold: #b8964e;
    --muted: #7a7060;
    --divider: #d4cdc0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 20px 24px 14px;
    text-align: center;
  }
  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 8vw, 48px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .masthead .edition {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
    border-top: 1px solid var(--divider);
    padding-top: 8px;
  }
  .location-bar {
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    padding: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .location-bar span { color: var(--gold); text-decoration: underline; }
  .sections { padding: 0 20px; }
  .section {
    border-bottom: 1px solid var(--divider);
    padding: 20px 0;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .section.visible { opacity: 1; transform: none; }
  .section-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--divider);
  }
  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(17px, 4.5vw, 24px);
    line-height: 1.4;
    font-style: italic;
  }
  .quote-author {
    margin-top: 10px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .quote-author::before { content: '— '; }
  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .weather-main {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .weather-temp {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
  }
  .weather-desc { font-size: 15px; color: var(--muted); line-height: 1.4; }
  .weather-detail {
    font-size: 12px;
    color: var(--muted);
    background: rgba(0,0,0,0.04);
    padding: 8px 12px;
    border-radius: 4px;
  }
  .weather-detail strong { display: block; color: var(--ink); font-size: 14px; font-weight: 500; }
  .news-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--divider);
  }
  .news-item:last-child { border-bottom: none; }
  .news-headline {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    line-height: 1.3;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .news-headline a { color: var(--ink); text-decoration: none; }
  .news-headline a:hover { color: var(--accent); }
  .news-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .news-source { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-top: 4px; }
  .schedule-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .schedule-input {
    flex: 1;
    background: white;
    border: 1px solid var(--divider);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .schedule-input:focus { border-color: var(--ink); }
  .add-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .schedule-list { list-style: none; }
  .schedule-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--divider);
    font-size: 14px;
  }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-time { font-size: 11px; color: var(--accent); font-weight: 500; min-width: 38px; }
  .schedule-remove { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .skeleton {
    background: linear-gradient(90deg, #e8e0d0 25%, #d8d0c0 50%, #e8e0d0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    height: 18px;
    margin-bottom: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .refresh-btn {
    display: block;
    margin: 24px auto 0;
    background: none;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 12px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.2s, color 0.2s;
  }
  .refresh-btn:hover { background: var(--ink); color: var(--paper); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="location-bar" id="locationBar" onclick="promptCity()">
  📍 Tap to set your city for weather — <span>set location</span>
</div>

<div class="masthead">
  <div class="masthead-top">
    <span id="todayDate">—</span>
    <span>Good Morning, Arturo</span>
    <span id="todayDay">—</span>
  </div>
  <h1>The Daily Brief</h1>
  <div class="edition">Your personal morning edition</div>
</div>

<div class="sections">

  <div class="section" id="quoteSection">
    <div class="section-label">Morning Thought</div>
    <div id="quoteContent"><div class="skeleton" style="width:100%"></div><div class="skeleton" style="width:70%"></div></div>
  </div>

  <div class="section" id="weatherSection">
    <div class="section-label">Weather</div>
    <div id="weatherContent"><div class="skeleton" style="width:40%;height:52px;margin-bottom:12px"></div><div class="skeleton" style="width:100%"></div></div>
  </div>

  <div class="section" id="newsSection">
    <div class="section-label">Top News</div>
    <div id="newsContent">
      <div class="skeleton" style="width:100%"></div><div class="skeleton" style="width:70%;margin-bottom:16px"></div>
      <div class="skeleton" style="width:100%"></div><div class="skeleton" style="width:70%;margin-bottom:16px"></div>
      <div class="skeleton" style="width:100%"></div>
    </div>
  </div>

  <div class="section visible" id="scheduleSection">
    <div class="section-label">Today's Plan</div>
    <div class="schedule-input-row">
      <input class="schedule-input" id="taskInput" placeholder="Add something for today..." type="text" />
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
    <ul class="schedule-list" id="taskList"></ul>
  </div>

</div>

<button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ Refresh Brief</button>

<script>
// ── Quotes list (no API needed) ───────────────────────────
const QUOTES = [
  { quote: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
  { quote: "Strength does not come from the body. It comes from the will of the soul.", author: "Mahatma Gandhi" },
  { quote: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
  { quote: "The harder you work, the luckier you get.", author: "Gary Player" },
  { quote: "You don't have to be extreme, just consistent.", author: "Unknown" },
  { quote: "Take care of your body. It's the only place you have to live.", author: "Jim Rohn" },
  { quote: "The pain you feel today will be the strength you feel tomorrow.", author: "Arnold Schwarzenegger" },
  { quote: "It never gets easier. You just get better.", author: "Unknown" },
  { quote: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
  { quote: "What seems impossible today will one day become your warm-up.", author: "Unknown" },
  { quote: "Discipline is the bridge between goals and accomplishment.", author: "Jim Rohn" },
  { quote: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
  { quote: "Don't limit your challenges. Challenge your limits.", author: "Unknown" },
  { quote: "The body achieves what the mind believes.", author: "Unknown" },
  { quote: "Work hard in silence, let success be your noise.", author: "Frank Ocean" },
  { quote: "Your future self is watching you right now through your memories.", author: "Aubrey De Grey" },
  { quote: "Be so good they can't ignore you.", author: "Steve Martin" },
  { quote: "It always seems impossible until it's done.", author: "Nelson Mandela" },
  { quote: "Energy and persistence conquer all things.", author: "Benjamin Franklin" },
  { quote: "The secret of getting ahead is getting started.", author: "Mark Twain" },
  { quote: "Champions aren't made in gyms. Champions are made from something deep inside.", author: "Muhammad Ali" },
  { quote: "Sweat is just fat crying.", author: "Unknown" },
  { quote: "Do something today that your future self will thank you for.", author: "Sean Patrick Flanery" },
  { quote: "If it doesn't challenge you, it doesn't change you.", author: "Fred Devito" },
  { quote: "The difference between try and triumph is a little umph.", author: "Marvin Phillips" },
  { quote: "You are your only limit.", author: "Unknown" },
  { quote: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
  { quote: "Dream big, work hard, stay focused.", author: "Unknown" },
  { quote: "Good things come to those who sweat.", author: "Unknown" },
  { quote: "Rise up, start fresh, see the bright opportunity in each new day.", author: "Unknown" },
  { quote: "Train insane or remain the same.", author: "Unknown" },
];

// ── Date ──────────────────────────────────────────────────
const now = new Date();
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('todayDate').textContent = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
document.getElementById('todayDay').textContent = DAYS[now.getDay()];

// ── Location ──────────────────────────────────────────────
const CITY_KEY = 'brief_city';
const LAT_KEY  = 'brief_lat';
const LON_KEY  = 'brief_lon';
let city = localStorage.getItem(CITY_KEY) || '';
let lat  = localStorage.getItem(LAT_KEY)  || '';
let lon  = localStorage.getItem(LON_KEY)  || '';

function updateLocationBar() {
  document.getElementById('locationBar').innerHTML = city
    ? `📍 Weather for <span>${city}</span> &nbsp;·&nbsp; <span onclick="promptCity()">change</span>`
    : `📍 Tap to set your city for weather — <span>set location</span>`;
}
updateLocationBar();

async function promptCity() {
  const input = prompt('Enter your city (e.g. Los Angeles):');
  if (!input || !input.trim()) return;
  city = input.trim();
  // Geocode via open-meteo geocoding API (free, no key)
  try {
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
    const geoData = await geo.json();
    if (geoData.results && geoData.results.length > 0) {
      lat = geoData.results[0].latitude;
      lon = geoData.results[0].longitude;
      city = geoData.results[0].name + (geoData.results[0].admin1 ? ', ' + geoData.results[0].admin1 : '');
      localStorage.setItem(CITY_KEY, city);
      localStorage.setItem(LAT_KEY, lat);
      localStorage.setItem(LON_KEY, lon);
      updateLocationBar();
      loadWeather();
    } else {
      alert("City not found. Try again with a different spelling.");
    }
  } catch(e) {
    alert("Couldn't look up that city. Check your connection.");
  }
}

// ── Tasks ──────────────────────────────────────────────────
const TASKS_KEY = 'brief_tasks_' + now.toDateString();
let tasks = JSON.parse(localStorage.getItem(TASKS_KEY) || '[]');
function saveTasks() { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); }
function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = tasks.length === 0
    ? '<li style="color:var(--muted);font-size:13px;padding:8px 0">No tasks yet — add something above.</li>'
    : tasks.map((t, i) => `
        <li class="schedule-item">
          <span class="schedule-time">${t.time}</span>
          <span>${t.text}</span>
          <button class="schedule-remove" onclick="removeTask(${i})">×</button>
        </li>`).join('');
}
function addTask() {
  const input = document.getElementById('taskInput');
  const val = input.value.trim();
  if (!val) return;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  tasks.push({ text: val, time });
  saveTasks();
  renderTasks();
  input.value = '';
}
function removeTask(i) { tasks.splice(i, 1); saveTasks(); renderTasks(); }
document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
renderTasks();

// ── Reveal ────────────────────────────────────────────────
function reveal(id, delay = 0) {
  setTimeout(() => document.getElementById(id)?.classList.add('visible'), delay);
}

// ── Quote (daily rotation from local list) ────────────────
function loadQuote() {
  const idx = now.getDate() % QUOTES.length;
  const q = QUOTES[idx];
  document.getElementById('quoteContent').innerHTML = `
    <div class="quote-text">${q.quote}</div>
    <div class="quote-author">${q.author}</div>`;
  reveal('quoteSection', 0);
}

// ── Weather (Open-Meteo — free, no key) ───────────────────
const WMO = {
  0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain', 71:'Light snow', 73:'Snow', 75:'Heavy snow',
  80:'Rain showers', 81:'Rain showers', 82:'Violent showers',
  95:'Thunderstorm', 96:'Thunderstorm w/ hail', 99:'Thunderstorm w/ hail'
};
async function loadWeather() {
  if (!lat || !lon) {
    document.getElementById('weatherContent').innerHTML =
      `<div class="error-msg">Tap the bar above to set your city.</div>`;
    reveal('weatherSection', 100);
    return;
  }
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`;
    const res = await fetch(url);
    const d = await res.json();
    const temp   = Math.round(d.current.temperature_2m) + '°F';
    const humid  = d.current.relative_humidity_2m + '%';
    const cond   = WMO[d.current.weather_code] || 'Unknown';
    const high   = Math.round(d.daily.temperature_2m_max[0]) + '°F';
    const low    = Math.round(d.daily.temperature_2m_min[0]) + '°F';
    document.getElementById('weatherContent').innerHTML = `
      <div class="weather-grid">
        <div class="weather-main">
          <div class="weather-temp">${temp}</div>
          <div class="weather-desc">${cond}<br><small style="font-size:11px;color:var(--muted)">${city}</small></div>
        </div>
        <div class="weather-detail"><strong>${high}</strong> High</div>
        <div class="weather-detail"><strong>${low}</strong> Low</div>
        <div class="weather-detail"><strong>${humid}</strong> Humidity</div>
      </div>`;
    reveal('weatherSection', 100);
  } catch(e) {
    document.getElementById('weatherContent').innerHTML = `<div class="error-msg">Couldn't load weather. Try refreshing.</div>`;
    reveal('weatherSection', 100);
  }
}

// ── News (RSS via rss2json — free tier) ───────────────────
async function loadNews() {
  try {
    // Using BBC Top Stories RSS via rss2json public proxy
    const rss = 'https://feeds.bbci.co.uk/news/rss.xml';
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
    const res = await fetch(url);
    const d   = await res.json();
    if (!d.items || d.items.length === 0) throw new Error('no items');
    const html = d.items.slice(0, 4).map(item => `
      <div class="news-item">
        <div class="news-headline"><a href="${item.link}" target="_blank">${item.title}</a></div>
        <div class="news-summary">${item.description ? item.description.replace(/<[^>]*>/g,'').slice(0,120) + '…' : ''}</div>
        <div class="news-source">BBC News</div>
      </div>`).join('');
    document.getElementById('newsContent').innerHTML = html;
    reveal('newsSection', 200);
  } catch(e) {
    document.getElementById('newsContent').innerHTML = `<div class="error-msg">Couldn't load news. Check your connection and refresh.</div>`;
    reveal('newsSection', 200);
  }
}

// ── Load all ──────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  ['quoteSection','weatherSection','newsSection'].forEach(id =>
    document.getElementById(id).classList.remove('visible'));
  loadQuote();
  await Promise.all([loadWeather(), loadNews()]);
  btn.disabled = false;
  btn.textContent = '↻ Refresh Brief';
}

loadAll();
</script>
</body>
</html>
